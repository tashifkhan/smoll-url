services:
  smoll-url:
    build: .
    container_name: smoll-url
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:${port:-4567}"
    volumes:
      - ${SMOLL_DATA_MOUNT:-smoll-url-data}:/data
    env_file:
      - .env
    environment:
      listen_address: 0.0.0.0
      port: ${port:-4567}
      db_url: ${DOCKER_DB_URL:-/data/urls.db}
      redis_url: ${redis_url:-redis://redis:6379/0}
      password: ${password:-changeme}
      api_key: ${api_key:-changeme}
      slug_length: ${slug_length:-6}
      use_wal_mode: ${use_wal_mode:-true}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${port:-4567}/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: smoll-url-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${REDIS_DATA_MOUNT:-smoll-url-redis-data}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 3s

