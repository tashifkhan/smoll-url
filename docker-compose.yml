services:
  smoll-url:
    build: .
    container_name: smoll-url
    restart: unless-stopped
    ports:
      - "8080:4567"
    volumes:
      - smoll-data:/data
    environment:
      - password=changeme          # admin password – CHANGE THIS
      - api_key=changeme           # API key        – CHANGE THIS
      - slug_length=6
      - use_wal_mode=true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4567/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  smoll-data:
